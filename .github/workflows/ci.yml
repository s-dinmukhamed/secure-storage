name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff
        run: ruff check app/ tests/

  test:
    name: Tests (pytest)
    runs-on: ubuntu-latest
    needs: lint

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: vault_user
          POSTGRES_PASSWORD: vault_pass
          POSTGRES_DB: vault_db_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U vault_user -d vault_db_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://vault_user:vault_pass@localhost/vault_db_test
      SECRET_KEY: test-secret-key-ci
      REFRESH_SECRET: test-refresh-secret-ci
      SIGNING_KEY: test-signing-key-ci

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt pytest pytest-cov httpx

      - name: Run tests
        run: pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false
